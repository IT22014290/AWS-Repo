name: Restaurant Service CI/CD - AWS

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - restaurant-service/**
      - .github/workflows/restaurant-service.yml

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: restaurant-service
        run: npm install

      - name: Run tests
        working-directory: restaurant-service
        run: npm test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./restaurant-service
          push: true
          tags: 595260679779.dkr.ecr.eu-north-1.amazonaws.com/food-delivery-restaurant:latest

      - name: Deploy to Amazon ECS
        run: |
          aws ecs update-service \
            --cluster food-delivery-cluster1 \
            --service food-delivery-restaurant \
            --force-new-deployment \
            --region eu-north-1
